name: Release

on:
  schedule:
    - cron: "0 9 1,15 * *"
  workflow_dispatch:

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      TAG: ${{ steps.gen.outputs.TAG }}
      PRERELEASE: ${{ steps.gen.outputs.PRERELEASE }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate tag
        id: gen
        run: |
          VER=$(head -1 VERSION | sed 's/^v//')
          # 根据是否包含 -dev 判断 pre-release 还是稳定版
          if echo "$VER" | grep -q '\-dev'; then
            VER_CLEAN=$(echo "$VER" | sed 's/-dev//')
            TAG="v${VER_CLEAN}"
            echo "PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            TAG="v${VER}"
            echo "PRERELEASE=false" >> $GITHUB_OUTPUT
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

  test:
    needs: tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        timeout-minutes: 5
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libegl1 libxkbcommon0 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libglib2.0-0 libportaudio2 portaudio19-dev libpulse0

      - name: Install Python dependencies
        timeout-minutes: 8
        run: |
          python -m pip install --upgrade pip -q
          pip install -r requirements.txt -q
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt -q; else pip install pytest-qt pytest-mock pytest-env pytest-timeout -q; fi

      - name: Run tests
        timeout-minutes: 6
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONIOENCODING: utf-8
          PYTEST_QT_API: pyside6
        run: |
          set +e
          python -m pytest -vv --tb=short --strict-markers -p no:warnings --timeout=60 --timeout-method=thread --durations=20
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 134 ]; then
            echo "::warning::Qt cleanup crash after all tests passed — treating as success"
            exit 0
          fi
          exit $EXIT_CODE

  release:
    needs: [tag, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.TAG }}
          name: ${{ needs.tag.outputs.TAG }}
          generate_release_notes: true
          prerelease: ${{ needs.tag.outputs.PRERELEASE == 'true' }}

  bundle:
    needs: [tag, test]
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
            artifact: sakura-${{ needs.tag.outputs.TAG }}-windows-x64.zip
            runtime_artifact: runtime-windows-x64.zip
            embed_url: https://www.python.org/ftp/python/3.12.8/python-3.12.8-embed-amd64.zip
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12 (Windows download embeddable)
        if: matrix.platform == 'windows-x64'
        shell: bash
        run: curl -fL -o python-embed.zip "${{ matrix.embed_url }}"

      - name: Setup Python 3.12 (macOS via python-build-standalone)
        if: matrix.platform != 'windows-x64'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASES_URL="https://api.github.com/repos/astral-sh/python-build-standalone/releases/tags/20250106"
          echo "Fetching release metadata: $RELEASES_URL"
          RESP=$(curl -sS --connect-timeout 15 --max-time 30 \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "$RELEASES_URL")
          if [ -z "$RESP" ]; then
            echo "ERROR: empty response from GitHub API"
            exit 1
          fi
          ASSET_URL=$(echo "$RESP" | python3 -c "
          import sys, json
          rel = json.load(sys.stdin)
          if not isinstance(rel, dict):
              err = rel.get('message', 'unknown error')
              raise SystemExit(f'GitHub API error: {err}')
          for a in rel.get('assets', []):
              n = a.get('name', '')
              if 'cpython-3.12' in n and 'aarch64-apple-darwin' in n and n.endswith('.tar.gz'):
                  print(a['browser_download_url'])
                  raise SystemExit(0)
          raise SystemExit('no matching asset found')
          ")
          echo "Downloading: $ASSET_URL"
          curl -fL --connect-timeout 15 --max-time 600 -o python-standalone.tar.gz "$ASSET_URL"

      - name: Extract Python to runtime/
        shell: bash
        run: |
          rm -rf runtime
          if [[ "${{ matrix.platform }}" == "windows-x64" ]]; then
            mkdir -p runtime
            unzip -q python-embed.zip -d runtime/
          else
            mkdir -p runtime
            tar -xzf python-standalone.tar.gz -C runtime/ --strip-components=1
          fi

      - name: Setup pip and modify _pth (Windows)
        if: matrix.platform == 'windows-x64'
        shell: bash
        run: |
          curl -fL -o runtime/get-pip.py https://bootstrap.pypa.io/get-pip.py
          # 取消注释 import site，使 pip 和 site-packages 可用（embed 默认是注释掉的）
          sed -i 's/^#import site/import site/' runtime/python312._pth
          ./runtime/python.exe runtime/get-pip.py --no-warn-script-location
          # 追加 .. 让 Python 能找到项目根目录的 app 模块
          echo '..' >> runtime/python312._pth

      - name: Setup pip (macOS)
        if: matrix.platform != 'windows-x64'
        shell: bash
        run: ./runtime/bin/python3 -m pip install --upgrade pip -q

      - name: Make scripts executable (macOS)
        if: matrix.platform != 'windows-x64'
        shell: bash
        run: chmod +x scripts/install.sh scripts/start.sh scripts/install.command scripts/start.command

      - name: Tidy macOS bundle layout
        if: matrix.platform != 'windows-x64'
        shell: bash
        run: |
          cp scripts/install.command install.command
          cp scripts/start.command start.command
          rm -f install.bat start.bat

      - name: Tidy Windows bundle layout
        if: matrix.platform == 'windows-x64'
        shell: bash
        run: rm -f install.command start.command python-embed.zip

      - name: Create bundle archive (Windows)
        if: matrix.platform == 'windows-x64'
        shell: pwsh
        run: Compress-Archive -Path * -DestinationPath "${{ matrix.artifact }}" -Force

      - name: Create runtime archive (Windows)
        if: matrix.platform == 'windows-x64'
        shell: pwsh
        run: Compress-Archive -Path runtime -DestinationPath "${{ matrix.runtime_artifact }}" -Force

      - name: Create runtime archive (macOS)
        if: matrix.platform != 'windows-x64'
        shell: bash
        run: zip -rq "${{ matrix.runtime_artifact }}" runtime

      - name: Create bundle archive (macOS)
        if: matrix.platform != 'windows-x64'
        shell: bash
        run: |
          zip -rq "${{ matrix.artifact }}" . \
            -x '.git/*' '*.pyc' '__pycache__/*' \
            'data/tts_bundles/*' '*.egg-info/*' '*.dist-info/*' \
            'tests/*' 'pytest.ini'

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.TAG }}
          files: |
            ${{ matrix.artifact }}
            ${{ matrix.runtime_artifact }}
